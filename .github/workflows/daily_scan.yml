name: Daily Global Market Scan

on:
  schedule:
    # 毎日 日本時間 朝7:00 (UTC 22:00) に実行
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Global Market Scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python global_market_scanner.py

      - name: Commit and Push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add market_scan_results.csv portfolio_scan_results.csv
          git commit -m "Update daily scan and portfolio results [skip ci]" || echo "No changes to commit"
          git push
